<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Groq Speech-to-Text</title>
  <style>
    :root {
      --bg: #eef3f8;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --primary: #0ea5e9;
      --danger: #dc2626;
      --ok: #16a34a;
      --warn: #b45309;
      --border: #cbd5e1;
    }

    * {
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    * {
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      color: var(--text);
      background: radial-gradient(circle at top left, #dbeafe, var(--bg) 38%);
      min-height: 100dvh;
    }

    .container {
      display: flex;
      flex-direction: column;
      max-width: 920px;
      margin: 0 auto;
      min-height: 100dvh;
      padding: 20px 14px max(16px, env(safe-area-inset-bottom));
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.06);
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    .stt-card {
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
      min-height: 0;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .card-header h2 {
      margin: 0;
    }

    .key-summary {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .key-settings-content {
      margin-top: 10px;
    }

    .key-settings-content.collapsed {
      display: none;
    }

    .btn-ghost {
      background: #f1f5f9;
      color: #0f172a;
      border: 1px solid var(--border);
      padding: 8px 10px;
      font-size: 13px;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .field {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    input[type="password"], textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
    }

    textarea {
      min-height: 130px;
      resize: none;
      margin-top: 10px;
    }

    #sttResult {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
    }

    .actions {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin: 18px 0;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    button:focus:not(:focus-visible),
    input:focus:not(:focus-visible),
    textarea:focus:not(:focus-visible) {
      outline: none;
      box-shadow: none;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #1e293b;
    }

    .record-btn,
    .upload-btn {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      color: #fff;
      font-size: 16px;
      box-shadow: 0 6px 15px rgba(15, 23, 42, 0.2);
      transition: transform 0.15s;
    }

    .record-btn {
      background: linear-gradient(135deg, #ef4444, #b91c1c);
    }

    .upload-btn {
      background: linear-gradient(135deg, #0284c7, #075985);
      font-size: 28px;
    }

    .record-btn:active,
    .upload-btn:active {
      transform: scale(0.96);
    }

    .recording {
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
      70% { box-shadow: 0 0 0 18px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    .status {
      min-height: 22px;
      text-align: center;
      color: var(--muted);
    }

    .error {
      color: var(--danger);
    }

    .status.error {
      font-size: 12px;
      line-height: 1.3;
    }

    .ok {
      color: var(--ok);
    }

    .warn {
      color: var(--warn);
    }

    #audioFileInput {
      display: none;
    }

    .stt-bottom-actions {
      margin-top: 10px;
      margin-bottom: 0;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }

    @media (max-width: 720px) {
      h1 {
        font-size: 21px;
      }

      .stt-bottom-actions button {
        flex: 1 1 100%;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Speech-to-Text mit Groq</h1>

    <section class="card">
      <div class="card-header">
        <h2>Groq API Key</h2>
        <button id="toggleKeyPanelBtn" class="btn-ghost">Einstellungen</button>
      </div>
      <div id="keySummary" class="key-summary"></div>
      <div id="keySettingsContent" class="key-settings-content">
        <p>Der Key wird nur lokal im Browser gespeichert (LocalStorage).</p>
        <div class="field">
          <input id="groqApiKey" type="password" placeholder="gsk_..." autocomplete="off">
          <button id="saveKeyBtn" class="btn-primary">Key speichern</button>
          <button id="clearKeyBtn" class="btn-secondary">Key entfernen</button>
        </div>
      </div>
      <div id="keyStatus" class="status"></div>
    </section>

    <section class="card stt-card">
      <h2>Sprache zu Text</h2>
      <div class="actions">
        <button id="recordButton" class="record-btn">REC</button>
        <button id="uploadButton" class="upload-btn">📁</button>
      </div>
      <input type="file" id="audioFileInput" accept="audio/*">
      <div id="sttStatus" class="status">Bereit</div>
      <textarea id="sttResult" placeholder="Transkription erscheint hier..."></textarea>
      <div class="field stt-bottom-actions">
        <button id="copyBtn" class="btn-secondary">Text kopieren</button>
        <button id="copyAudioBtn" class="btn-secondary" disabled>Audio kopieren</button>
        <button id="downloadBtn" class="btn-secondary">Als Datei downloaden</button>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "groqApiKey";

    const keyInput = document.getElementById("groqApiKey");
    const saveKeyBtn = document.getElementById("saveKeyBtn");
    const clearKeyBtn = document.getElementById("clearKeyBtn");
    const toggleKeyPanelBtn = document.getElementById("toggleKeyPanelBtn");
    const keySettingsContent = document.getElementById("keySettingsContent");
    const keySummary = document.getElementById("keySummary");
    const keyStatus = document.getElementById("keyStatus");

    const sttStatus = document.getElementById("sttStatus");
    const sttResult = document.getElementById("sttResult");
    const copyBtn = document.getElementById("copyBtn");
    const copyAudioBtn = document.getElementById("copyAudioBtn");
    const downloadBtn = document.getElementById("downloadBtn");

    const recordBtn = document.getElementById("recordButton");
    const uploadBtn = document.getElementById("uploadButton");
    const audioFileInput = document.getElementById("audioFileInput");

    let mediaRecorder;
    let chunks = [];
    let audioStream;
    let wakeLock = null;
    let lastAudioBlob = null;
    let lastAudioFileName = "";

    function updateAudioCopyButtonState() {
      copyAudioBtn.disabled = !lastAudioBlob;
    }

    function rememberAudioForClipboard(blobOrFile, fileName) {
      lastAudioBlob = blobOrFile;
      lastAudioFileName = fileName || "audio.webm";
      updateAudioCopyButtonState();
    }

    async function requestScreenWakeLock() {
      if (!("wakeLock" in navigator)) {
        return;
      }

      if (document.visibilityState !== "visible") {
        return;
      }

      try {
        if (wakeLock && !wakeLock.released) {
          return;
        }

        wakeLock = await navigator.wakeLock.request("screen");
        wakeLock.addEventListener("release", () => {
          wakeLock = null;
        });
      } catch {
        wakeLock = null;
      }
    }

    async function releaseScreenWakeLock() {
      if (!wakeLock) {
        return;
      }

      try {
        await wakeLock.release();
      } catch {
      } finally {
        wakeLock = null;
      }
    }

    function getSavedApiKey() {
      return localStorage.getItem(STORAGE_KEY) || "";
    }

    function setKeyMessage(message, cssClass) {
      keyStatus.textContent = message;
      keyStatus.className = `status ${cssClass || ""}`;
    }

    function setKeyPanelCollapsed(collapsed) {
      keySettingsContent.classList.toggle("collapsed", collapsed);
      toggleKeyPanelBtn.textContent = collapsed ? "Einstellungen" : "Zuklappen";
    }

    function setKeySummary(hasKey) {
      keySummary.textContent = hasKey
        ? "API Key vorhanden. Bereich ist minimiert."
        : "Kein API Key vorhanden. Bitte Einstellungen ausfuellen.";
      keySummary.className = `key-summary ${hasKey ? "ok" : "error"}`;
    }

    function updateKeyState() {
      const apiKey = getSavedApiKey();
      if (!apiKey) {
        setKeyMessage("Kein Groq API Key gespeichert. Bitte zuerst hinterlegen.", "error");
        setKeySummary(false);
        setKeyPanelCollapsed(false);
        return false;
      }
      setKeyMessage("API Key gespeichert.", "ok");
      setKeySummary(true);
      setKeyPanelCollapsed(true);
      return true;
    }

    toggleKeyPanelBtn.addEventListener("click", () => {
      const isCollapsed = keySettingsContent.classList.contains("collapsed");
      setKeyPanelCollapsed(!isCollapsed);
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        requestScreenWakeLock();
      }
    });

    window.addEventListener("pagehide", () => {
      releaseScreenWakeLock();
    });

    saveKeyBtn.addEventListener("click", () => {
      const value = keyInput.value.trim();
      if (!value) {
        localStorage.removeItem(STORAGE_KEY);
        updateKeyState();
        return;
      }
      localStorage.setItem(STORAGE_KEY, value);
      keyInput.value = "";
      updateKeyState();
    });

    clearKeyBtn.addEventListener("click", () => {
      localStorage.removeItem(STORAGE_KEY);
      keyInput.value = "";
      updateKeyState();
    });

    function copyWithExecCommand(text) {
      const area = document.createElement("textarea");
      area.value = text;
      area.setAttribute("readonly", "");
      area.style.position = "fixed";
      area.style.opacity = "0";
      area.style.pointerEvents = "none";
      document.body.appendChild(area);
      area.focus();
      area.select();
      area.setSelectionRange(0, area.value.length);

      let copied = false;
      try {
        copied = document.execCommand("copy");
      } catch {
        copied = false;
      }

      document.body.removeChild(area);
      return copied;
    }

    async function verifyClipboardText(expectedText) {
      if (!navigator.clipboard || !navigator.clipboard.readText) {
        return null;
      }
      try {
        const clipboardText = await navigator.clipboard.readText();
        return clipboardText === expectedText;
      } catch {
        return null;
      }
    }

    async function copyTextRobust(text) {
      let attemptedClipboardApi = false;

      if (navigator.clipboard && navigator.clipboard.writeText) {
        try {
          attemptedClipboardApi = true;
          await navigator.clipboard.writeText(text);

          const verified = await verifyClipboardText(text);
          if (verified === true || verified === null) {
            return { success: true, verified };
          }
        } catch {
        }
      }

      const fallbackCopied = copyWithExecCommand(text);
      if (!fallbackCopied) {
        return { success: false, verified: false };
      }

      const fallbackVerified = await verifyClipboardText(text);
      if (fallbackVerified === false && attemptedClipboardApi) {
        return { success: true, verified: false };
      }

      return { success: true, verified: fallbackVerified };
    }

    function getClipboardMimeSupport(mimeType) {
      if (typeof ClipboardItem === "undefined") {
        return false;
      }

      if (typeof ClipboardItem.supports !== "function") {
        return null;
      }

      try {
        return ClipboardItem.supports(mimeType);
      } catch {
        return false;
      }
    }

    function withAudioExtension(fileName, mimeType) {
      const extensionMap = {
        "audio/mpeg": ".mp3",
        "audio/wav": ".wav",
        "audio/webm": ".webm",
        "audio/ogg": ".ogg"
      };

      const fallbackName = fileName || "audio.webm";
      const extension = extensionMap[mimeType] || ".bin";
      const dotIndex = fallbackName.lastIndexOf(".");
      if (dotIndex <= 0) {
        return `${fallbackName}${extension}`;
      }

      return `${fallbackName.slice(0, dotIndex)}${extension}`;
    }

    function audioBufferToWavBlob(audioBuffer) {
      const numChannels = audioBuffer.numberOfChannels;
      const sampleRate = audioBuffer.sampleRate;
      const length = audioBuffer.length;
      const bytesPerSample = 2;
      const blockAlign = numChannels * bytesPerSample;
      const dataSize = length * blockAlign;
      const buffer = new ArrayBuffer(44 + dataSize);
      const view = new DataView(buffer);

      function writeAscii(offset, value) {
        for (let i = 0; i < value.length; i += 1) {
          view.setUint8(offset + i, value.charCodeAt(i));
        }
      }

      writeAscii(0, "RIFF");
      view.setUint32(4, 36 + dataSize, true);
      writeAscii(8, "WAVE");
      writeAscii(12, "fmt ");
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, numChannels, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * blockAlign, true);
      view.setUint16(32, blockAlign, true);
      view.setUint16(34, bytesPerSample * 8, true);
      writeAscii(36, "data");
      view.setUint32(40, dataSize, true);

      const channelData = [];
      for (let channel = 0; channel < numChannels; channel += 1) {
        channelData.push(audioBuffer.getChannelData(channel));
      }

      let offset = 44;
      for (let i = 0; i < length; i += 1) {
        for (let channel = 0; channel < numChannels; channel += 1) {
          const sample = Math.max(-1, Math.min(1, channelData[channel][i]));
          const intSample = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
          view.setInt16(offset, intSample, true);
          offset += bytesPerSample;
        }
      }

      return new Blob([buffer], { type: "audio/wav" });
    }

    async function convertAudioBlobToWav(blobOrFile) {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        return null;
      }

      const audioContext = new AudioContextClass();
      try {
        const arrayBuffer = await blobOrFile.arrayBuffer();
        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer.slice(0));
        return audioBufferToWavBlob(audioBuffer);
      } catch {
        return null;
      } finally {
        await audioContext.close();
      }
    }

    async function buildClipboardAudioPayloads(blobOrFile, fileName) {
      const sourceType = blobOrFile.type && blobOrFile.type.startsWith("audio/")
        ? blobOrFile.type
        : "audio/webm";
      const normalizedBlob = blobOrFile.type === sourceType
        ? blobOrFile
        : blobOrFile.slice(0, blobOrFile.size, sourceType);
      const payloads = [];

      function addPayload(mimeType, payloadBlob, conversion) {
        if (payloads.some((item) => item.mimeType === mimeType)) {
          return;
        }

        payloads.push({
          blob: payloadBlob,
          mimeType,
          fileName: withAudioExtension(fileName, mimeType),
          conversion
        });
      }

      const mpegSupport = getClipboardMimeSupport("audio/mpeg");
      if (sourceType === "audio/mpeg" && mpegSupport !== false) {
        addPayload("audio/mpeg", normalizedBlob, "none");
      }

      const wavSupport = getClipboardMimeSupport("audio/wav");
      if (wavSupport !== false) {
        const wavBlob = await convertAudioBlobToWav(normalizedBlob);
        if (wavBlob) {
          addPayload(
            "audio/wav",
            wavBlob,
            sourceType === "audio/wav" ? "none" : `converted:${sourceType}->audio/wav`
          );
        }
      }

      const sourceSupport = getClipboardMimeSupport(sourceType);
      if (sourceSupport !== false) {
        addPayload(sourceType, normalizedBlob, "none");
      }

      return {
        payloads,
        sourceType,
        supports: {
          mpeg: mpegSupport,
          wav: wavSupport,
          source: sourceSupport
        }
      };
    }

    async function copyAudioToClipboard(blobOrFile, fileName) {
      if (!navigator.clipboard || !navigator.clipboard.write || typeof ClipboardItem === "undefined") {
        return { success: false, reason: "unsupported" };
      }

      const payloadResult = await buildClipboardAudioPayloads(blobOrFile, fileName);
      if (!payloadResult.payloads.length) {
        return {
          success: false,
          reason: "unsupported-type",
          sourceType: payloadResult.sourceType,
          supports: payloadResult.supports
        };
      }

      const attempts = [];
      for (const payload of payloadResult.payloads) {
        const audioFile = new File([payload.blob], payload.fileName, {
          type: payload.mimeType,
          lastModified: Date.now()
        });

        try {
          const clipboardItem = new ClipboardItem({
            [payload.mimeType]: audioFile,
            "text/plain": new Blob([audioFile.name], { type: "text/plain" })
          });
          await navigator.clipboard.write([clipboardItem]);
          return {
            success: true,
            mimeType: payload.mimeType,
            fileName: audioFile.name,
            conversion: payload.conversion
          };
        } catch (error) {
          attempts.push({
            mimeType: payload.mimeType,
            errorName: error && error.name ? error.name : "UnknownError",
            errorMessage: error && error.message ? error.message : "Unknown clipboard error"
          });
        }
      }

      const lastAttempt = attempts[attempts.length - 1] || {
        errorName: "UnknownError",
        errorMessage: "Unknown clipboard error"
      };

      return {
        success: false,
        reason: "failed",
        attempts,
        errorName: lastAttempt.errorName,
        errorMessage: lastAttempt.errorMessage
      };
    }

    function logClipboardDiagnostics(blobOrFile, fileName) {
      const sourceType = blobOrFile && blobOrFile.type ? blobOrFile.type : "(leer)";
      const normalizedType = sourceType.startsWith("audio/") ? sourceType : "audio/webm";
      const supportsClipboard = Boolean(navigator.clipboard && navigator.clipboard.write);
      const supportsClipboardItem = typeof ClipboardItem !== "undefined";
      const supportsAudioMime = getClipboardMimeSupport(normalizedType);
      const supportsWav = getClipboardMimeSupport("audio/wav");
      const supportsMpeg = getClipboardMimeSupport("audio/mpeg");

      console.log("[AudioClipboard] Diagnose", {
        fileName: fileName || "audio.webm",
        blobType: sourceType,
        blobSize: blobOrFile ? blobOrFile.size : 0,
        normalizedType,
        preferredType: "audio/mpeg",
        isSecureContext,
        visibilityState: document.visibilityState,
        clipboardWriteAvailable: supportsClipboard,
        clipboardItemAvailable: supportsClipboardItem,
        clipboardItemSupportsType: supportsAudioMime,
        clipboardItemSupportsWav: supportsWav,
        clipboardItemSupportsMpeg: supportsMpeg
      });
    }

    copyBtn.addEventListener("click", async () => {
      const text = sttResult.value;
      if (!text) {
        return;
      }

      const copyResult = await copyTextRobust(text);
      if (!copyResult.success) {
        sttStatus.textContent = "Kopieren fehlgeschlagen.";
        sttStatus.className = "status error";
        return;
      }

      if (copyResult.verified === true) {
        sttStatus.textContent = "Text vollstaendig kopiert.";
        sttStatus.className = "status ok";
        return;
      }

      if (copyResult.verified === false) {
        sttStatus.textContent = "Warnung: Zwischenablage wirkt gekuerzt. Bitte 'Als Datei downloaden' nutzen.";
        sttStatus.className = "status warn";
        return;
      }

      sttStatus.textContent = "Text kopiert. Vollstaendigkeit konnte nicht geprueft werden. Bei Problemen bitte Datei-Download nutzen.";
      sttStatus.className = "status warn";
    });

    copyAudioBtn.addEventListener("click", async () => {
      if (!lastAudioBlob) {
        sttStatus.textContent = "Kein Audio verfuegbar. Bitte erst aufnehmen oder Datei hochladen.";
        sttStatus.className = "status warn";
        return;
      }

      logClipboardDiagnostics(lastAudioBlob, lastAudioFileName);
      const copyResult = await copyAudioToClipboard(lastAudioBlob, lastAudioFileName);
      if (copyResult.success) {
        console.log("[AudioClipboard] Kopieren erfolgreich.", {
          mimeType: copyResult.mimeType,
          fileName: copyResult.fileName,
          conversion: copyResult.conversion
        });
        sttStatus.textContent = `Audio in Zwischenablage kopiert (${copyResult.mimeType}). Zielprogramm muss Audio-Paste unterstuetzen.`;
        sttStatus.className = "status ok";
        return;
      }

      if (copyResult.reason === "unsupported") {
        console.warn("[AudioClipboard] Browser unterstuetzt Audio-Clipboard nicht.");
        sttStatus.textContent = "Audio-Zwischenablage wird von diesem Browser nicht unterstuetzt. Bitte Download nutzen.";
        sttStatus.className = "status warn";
        return;
      }

      if (copyResult.reason === "unsupported-type") {
        console.warn("[AudioClipboard] Kein kompatibler Audio-MIME-Typ verfuegbar.", {
          sourceType: copyResult.sourceType,
          supports: copyResult.supports
        });
        sttStatus.textContent = "Browser blockiert Audio-Formate fuer Clipboard. Bitte Download nutzen.";
        sttStatus.className = "status warn";
        return;
      }

      console.error("[AudioClipboard] Kopieren fehlgeschlagen.", {
        errorName: copyResult.errorName || "UnknownError",
        errorMessage: copyResult.errorMessage || "Unknown clipboard error",
        attempts: copyResult.attempts || []
      });

      sttStatus.textContent = "Audio konnte nicht in die Zwischenablage kopiert werden. Bitte Download nutzen.";
      sttStatus.className = "status warn";
    });

    downloadBtn.addEventListener("click", () => {
      const text = sttResult.value;
      if (!text) {
        return;
      }

      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      const timestamp = new Date().toISOString().replace(/[:.]/g, "-");

      link.href = url;
      link.download = `transkription-${timestamp}.txt`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      URL.revokeObjectURL(url);
      sttStatus.textContent = "Textdatei heruntergeladen.";
      sttStatus.className = "status ok";
    });

    sttResult.addEventListener("click", () => sttResult.select());

    uploadBtn.addEventListener("click", () => {
      audioFileInput.click();
    });

    audioFileInput.addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) {
        return;
      }
      try {
        await transcribeFile(file);
      } finally {
        audioFileInput.value = "";
      }
    });

    recordBtn.addEventListener("click", async () => {
      if (recordBtn.classList.contains("recording")) {
        mediaRecorder.stop();
        return;
      }

      if (!updateKeyState()) {
        sttStatus.textContent = "Fehler: Kein API Key vorhanden.";
        sttStatus.className = "status error";
        return;
      }

      try {
        audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch {
        sttStatus.textContent = "Mikrofonzugriff verweigert.";
        sttStatus.className = "status error";
        return;
      }

      chunks = [];
      mediaRecorder = new MediaRecorder(audioStream);
      mediaRecorder.ondataavailable = (e) => chunks.push(e.data);

      mediaRecorder.onstop = async () => {
        recordBtn.classList.remove("recording");
        audioStream.getTracks().forEach((track) => track.stop());
        const blob = new Blob(chunks, { type: "audio/webm" });
        await transcribeBlob(blob, "recording.webm");
      };

      mediaRecorder.start();
      recordBtn.classList.add("recording");
      sttStatus.textContent = "Aufnahme...";
      sttStatus.className = "status";
    });

    async function transcribeFile(file) {
      await transcribeBlob(file, file.name || "upload.webm");
    }

    async function transcribeBlob(blobOrFile, fileName) {
      if (!updateKeyState()) {
        sttStatus.textContent = "Fehler: Kein API Key vorhanden.";
        sttStatus.className = "status error";
        return;
      }

      rememberAudioForClipboard(blobOrFile, fileName);

      sttStatus.textContent = "Transkribiere...";
      sttStatus.className = "status";

      try {
        const formData = new FormData();
        formData.append("file", blobOrFile, fileName);

        const response = await fetch("/api/transcriptions", {
          method: "POST",
          headers: {
            "X-Groq-Api-Key": getSavedApiKey()
          },
          body: formData
        });

        const payload = await response.json();

        if (!response.ok) {
          const message = payload.error || "Transkription fehlgeschlagen.";
          throw new Error(message);
        }

        sttResult.value = payload.text || "";
        sttStatus.textContent = "Fertig.";
        sttStatus.className = "status ok";
      } catch (error) {
        sttStatus.textContent = `Fehler: ${error.message}`;
        sttStatus.className = "status error";
      }
    }

    requestScreenWakeLock();
    updateAudioCopyButtonState();
    updateKeyState();
  </script>
</body>
</html>
